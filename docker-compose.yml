services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Deterministic offline provider by default. To use a real LLM, set
      # LLM_PROVIDER=real, LLM_API_KEY, and LLM_MODEL (litellm provider/model,
      # e.g. gemini/gemini-2.5-flash). LLM_BASE_URL is optional (custom endpoints).
      LLM_PROVIDER: "${LLM_PROVIDER:-fake}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_BASE_URL: "${LLM_BASE_URL:-}"
    volumes:
      - fraud-data:/data

volumes:
  fraud-data:
